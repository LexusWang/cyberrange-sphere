[defaults]
inventory = inventory.ini
roles_path = roles
host_key_checking = False
timeout = 30
gathering = smart
fact_caching = memory

[privilege_escalation]
become = True
become_method = sudo
become_ask_pass = True
become_flags = -H -S

[ssh_connection]
pipelining = False
ssh_args = -o ControlMaster=auto -o ControlPersist=60s
