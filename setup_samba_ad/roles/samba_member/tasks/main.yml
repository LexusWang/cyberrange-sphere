---
# Samba4 Domain Member 配置任务

- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Install Samba and Kerberos packages
  apt:
    name:
      - samba
      - smbclient
      - krb5-user
      - krb5-config
      - winbind
      - libpam-winbind
      - libnss-winbind
      - acl
      - attr
      - dnsutils
    state: present
  environment:
    DEBIAN_FRONTEND: noninteractive

- name: Configure /etc/hosts with DC entry
  lineinfile:
    path: /etc/hosts
    line: "{{ dc_ip }} victim1.{{ domain_name | lower }} victim1"
    state: present
    insertafter: "^127.0.0.1"

- name: Configure /etc/hosts with self entry
  lineinfile:
    path: /etc/hosts
    line: "{{ hostvars[inventory_hostname]['ansible_eth1']['ipv4']['address'] | default(ansible_default_ipv4.address) }} {{ ansible_hostname }}.{{ domain_name | lower }} {{ ansible_hostname }}"
    state: present
    insertafter: "^127.0.0.1"
  ignore_errors: yes

- name: Configure resolv.conf to use DC as DNS
  copy:
    content: |
      # Generated by Ansible for Samba AD
      search {{ domain_name | lower }}
      nameserver {{ dc_ip }}
    dest: /etc/resolv.conf
    backup: yes

- name: Disable systemd-resolved to prevent DNS conflicts
  systemd:
    name: systemd-resolved
    state: stopped
    enabled: no
  ignore_errors: yes

- name: Configure Kerberos
  template:
    src: krb5.conf.j2
    dest: /etc/krb5.conf
    backup: yes

- name: Stop Samba services before joining domain
  systemd:
    name: "{{ item }}"
    state: stopped
  loop:
    - smbd
    - nmbd
    - winbind
  ignore_errors: yes

- name: Backup original smb.conf
  copy:
    src: /etc/samba/smb.conf
    dest: /etc/samba/smb.conf.orig
    remote_src: yes
    force: no
  ignore_errors: yes

- name: Configure smb.conf for domain member
  template:
    src: smb.conf.member.j2
    dest: /etc/samba/smb.conf
    backup: yes

- name: Check if already joined to domain
  command: net ads testjoin
  register: domain_joined
  changed_when: false
  failed_when: false

- name: Join the domain
  command: >
    net ads join -U Administrator%'{{ domain_admin_password }}'
  when: domain_joined.rc != 0
  register: join_result

- name: Display join result
  debug:
    var: join_result.stdout_lines
  when: join_result is defined and join_result.stdout_lines is defined

- name: Configure NSS for winbind
  lineinfile:
    path: /etc/nsswitch.conf
    regexp: "^{{ item.key }}:"
    line: "{{ item.key }}: {{ item.value }}"
    backup: yes
  loop:
    - { key: 'passwd', value: 'files systemd winbind' }
    - { key: 'group', value: 'files systemd winbind' }

- name: Configure PAM for winbind
  command: pam-auth-update --enable winbind
  ignore_errors: yes

- name: Create home directory on login
  lineinfile:
    path: /etc/pam.d/common-session
    line: "session required pam_mkhomedir.so skel=/etc/skel umask=0022"
    insertafter: "pam_unix.so"
    state: present
  ignore_errors: yes

- name: Start and enable Samba services
  systemd:
    name: "{{ item }}"
    state: started
    enabled: yes
    daemon_reload: yes
  loop:
    - smbd
    - nmbd
    - winbind

- name: Wait for winbind to be ready
  pause:
    seconds: 5

- name: Test winbind connection
  command: wbinfo -t
  register: wbinfo_test
  changed_when: false
  ignore_errors: yes

- name: Display winbind test result
  debug:
    var: wbinfo_test.stdout

- name: List domain users
  command: wbinfo -u
  register: domain_users
  changed_when: false
  ignore_errors: yes

- name: Display domain users
  debug:
    var: domain_users.stdout_lines

- name: Display member setup complete message
  debug:
    msg: |
      ==========================================
      Domain Member Setup Complete!
      Hostname: {{ ansible_hostname }}
      Domain: {{ domain_name | upper }}
      DC: victim1 ({{ dc_ip }})
      ==========================================
